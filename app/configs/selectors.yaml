# Unified Selectors Configuration

# Ingestion Selector Config
ingestion:
  target_html_selector: "main.page-content"
  
  # Root selectors define the absolute main container(s) we look for first.
  root_selectors:
    - "main"
    # - "[role='main']"
    - ".page-content"
    # - ".page-content"
    # - "body"

  # # Include selectors narrow down target text content within the selected root container.
  # include:
  #   strategy: "all_matches"
  #   selectors:
  #     - "main-business-wrapper"
   

  # Exclude rules specify elements to remove from the DOM tree entirely.
  exclude:
    tags:
      - "script"
      - "style"
      - "noscript"
      - "svg"
      - "header"
      - "footer"
      - "nav"
      - "aside"
      - "button"
    classes:
      - "sidebar"
      - "nav-menu"
      - "ads"
      # - "breadcrumb"
      - "advertisement"
      # - "primary-cta"
      - "product-details-nav"
      - "scroll-to-top"
      - "banner"
      - "hero-image"
      - "PrimaryCta_primary-cta__rTfZh"
    ids:
      - "sidebar"
      - "navigation"
      - "header"
      - "footer"
      - "nav-header"

  # html2text converter parsing options
  html_converter:
    ignore_images: true
    ignore_emphasis: true
    ignore_links: true
    body_width: 0

# Crawler Selectors Config (used by Playwright crawler engine)
crawler:
  default:
    content_selector: "body"
    loader_selector: null
    min_content_length: 100
    timeout_ms: 30000
    wait_for_visible: null

  domains:
    - domain: "dcb.bank.in"
      content_selector: "main.page-content"
      loader_selector: ".loader"
      min_content_length: 200
      timeout_ms: 45000
      wait_for_visible: "main.page-content"
