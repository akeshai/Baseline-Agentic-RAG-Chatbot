services:
  mongo:
    image: mongo:7.0
    container_name: chatbot_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  etcd:
    image: quay.io/coreos/etcd:v3.5.11
    container_name: chatbot_etcd
    restart: always
    environment:
      - ETCD_NAME=etcd
      - ETCD_AUTO_COMPACTION_RETENTION=1
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_INITIAL_CLUSTER=etcd=http://etcd:2380
    ports:
      - "2379:2379"

  minio:
    image: minio/minio:latest
    container_name: chatbot_minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.5.4
    container_name: chatbot_milvus
    restart: always
    ports:
      - "19530:19530"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    command: ["milvus", "run", "standalone"]
    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_healthy

  redis:
    image: redis:alpine
    container_name: chatbot_redis
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: services/knowledge/Dockerfile
    container_name: chatbot_app
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL_DOCKER}
      - MONGO_URI=${MONGO_URI_DOCKER}
      - MONGO_DB=${MONGO_DB}
      - MILVUS_URI=${MILVUS_URI_DOCKER}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT_DOCKER}
      - OBJECT_STORAGE_ROOT=/workspace/storage_buckets
    depends_on:
      mongo:
        condition: service_healthy
      milvus:
        condition: service_started
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./storage_buckets:/workspace/storage_buckets

volumes:
  mongodata:
  minio_data:
